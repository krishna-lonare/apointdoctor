<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Dashboard | ApointDoctor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .dashboard-container {
            padding: 3rem 1.5rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .filter-group {
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        .filter-label {
            font-weight: 500;
        }
        select.filter-select {
            padding: 0.5rem 1rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            background: white;
            font-family: inherit;
        }
        .action-btns {
            display: flex;
            gap: 0.5rem;
        }
        .btn-icon {
            padding: 0.25rem 0.5rem;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <span class="icon">⚕️</span> ApointDoctor <span style="font-size: 1rem; color: var(--text-muted); font-weight: normal; margin-left: 0.5rem;">| Dashboard</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Patient Portal</a></li>
            </ul>
        </div>
    </nav>

    <main class="dashboard-container">
        <div class="dashboard-header">
            <div>
                <h1 style="font-size: 2rem; color: var(--text-main);">Appointments</h1>
                <p class="text-muted">Manage all incoming bookings.</p>
            </div>
            <div class="filter-group">
                <span class="filter-label">Filter:</span>
                <select id="statusFilter" class="filter-select">
                    <option value="All">All Appointments</option>
                    <option value="Pending">Pending</option>
                    <option value="Confirmed">Confirmed</option>
                    <option value="Cancelled">Cancelled</option>
                </select>
                <button id="refreshBtn" class="btn btn-secondary btn-sm">Refresh</button>
            </div>
        </div>

        <div class="card">
            <div class="table-wrapper">
                <table class="table" id="appointmentsTable">
                    <thead>
                        <tr>
                            <th>Patient</th>
                            <th>Phone</th>
                            <th>Date / Time</th>
                            <th>Symptoms</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="appointmentsBody">
                        <!-- Loaded via JS -->
                        <tr><td colspan="6" class="text-center">Loading appointments...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="js/doctor.js"></script>
</body>
</html>
